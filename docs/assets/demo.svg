    <text x="24" y="190">  deploy/.env:5         ed25519   256  <tspan fill="#f85149">plaintext</tspan>                     0600</text>
    <text x="24" y="212">  legacy/server.key     rsa      2048  <tspan fill="#f85149">plaintext</tspan>                     <tspan fill="#f85149">0644 !</tspan></text>
    <text x="24" y="234">  ssh/id_ed25519        ed25519   256  <tspan fill="#f85149">plaintext</tspan>                     0600</text>
    <text x="24" y="256">  ssh/id_rsa            rsa      3072  <tspan fill="#7ee787">encrypted aes256-ctr</tspan>          0600</text>
    <text x="24" y="278">  ssh/putty.ppk         rsa      3072  <tspan fill="#7ee787">encrypted aes256-cbc</tspan>          0600</text>
    <text x="24" y="312" fill="#d2a8ff">CERTIFICATES (3)</text>
