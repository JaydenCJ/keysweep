    <text x="24" y="390" fill="#d2a8ff">SUMMARY</text>
    <text x="24" y="412">  private keys : 7 (<tspan fill="#f85149">4 plaintext</tspan>, 3 encrypted; <tspan fill="#f85149">2 with loose permissions</tspan>)</text>
